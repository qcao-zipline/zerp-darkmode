<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ZERP Dark Mode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>ZERP Dark Mode</h1>

      <p class="hint">
        LET THERE BE DARKNESS!!

      <p id="status" class="status"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
