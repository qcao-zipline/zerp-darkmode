<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ZERP Dark Mode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>ZERP Dark Mode</h1>
      <p id="version" class="meta"></p>

      <div class="field">
        <span>Theme mode</span>

        <div class="radio-group" role="radiogroup" aria-label="Theme mode">
          <label class="radio-option">
            <input type="radio" name="themeMode" value="dark" />
            <span>Dark</span>
          </label>

          <label class="radio-option">
            <input type="radio" name="themeMode" value="light" />
            <span>Light</span>
          </label>

          <label class="radio-option">
            <input type="radio" name="themeMode" value="system" />
            <span>System</span>
          </label>
        </div>
      </div>

      <div id="updateCard" class="update-card hidden">
        <p id="updateMessage" class="update-message"></p>
        <a id="updateLink" class="update-link" href="#" target="_blank" rel="noreferrer">Download latest ZIP</a>
      </div>

      <p id="status" class="status"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
